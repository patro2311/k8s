apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd
  name: httpd-deployment
spec:
  replicas: 10
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      containers:
        - image: httpd:alphine3.18
          name: httpd
  strategy:
    type: RollingUpdate # it's a default value
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

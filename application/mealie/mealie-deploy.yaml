apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mealier_tag
  name: mealier-deployment 
  namespace: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealier_tag
  template:
    metadata:
      labels:
        app: mealier_tag
    spec:
      containers:
        - image: ghcr.io/mealie-recipes/mealie:nightly
          name: mealie
          ports:
            - containerPort: 9000 # This will expose the the local  host where kubernetes is running, to the container port 9000
          volumeMounts:
            - mountPath: /app/data
              name: mealie-data-storage # needs to be same as a 'claimName'
      volumes:
        - name: mealie-data-storage # this name can be whatever you like 
          persistentVolumeClaim:
            claimName: mealie-data-storage
# COMMAND  kubectl get persistentvolume (now you can see name of the volume)
# kubectl get persistentvolumeclaim (now is define, its not pending anymore)

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mealier_tag
  name: mealier-deployment
spec:
  ports:
  - port: 8008 # Port to connect form your remote machine (local network)
    protocol: TCP
    targetPort: 9000
  selector:
    app: mealier_tag
  type: LoadBalancer # Now you can connect to the IP of the node + :9000 port
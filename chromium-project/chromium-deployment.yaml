# =================================
# API version and kind of resource
# =================================
apiVersion: apps/v1
kind: Deployment
# =================================
# Metadata (name, namespace, labels) and spec (replicas, selector, template) of the deployment
# =================================
metadata:
  namespace: default
  name: chromium-deployment
  labels:
    app: chromium
# Links deployment to Pods with the same label "chromium"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chromium
# =================================
# Template blueprint (Nodes and container lvl spec) blueprint for the deployment
# =================================
  template:
    metadata:
      labels:
        app: chromium
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: chromium-browser
          image: localhost:32000/chromium-browser:latest
          ports:
            - containerPort: 7001      

---
### service to expose the deployment
apiVersion: v1
kind: Service
metadata:
  name: google-chrome-service
spec:
  selector:
    app: chromium
  ports:
    - protocol: TCP
      port: 7001
      targetPort: 7001
      nodePort: 30100
  type: NodePort
  
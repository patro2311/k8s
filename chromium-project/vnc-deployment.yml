apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: Xvnc
  name: Xvnc-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: Xvnc
  template:
    metadata:
      labels:
        app: Xvnc
    spec:
      containers:
      - image: 127.0.0.1:5000/Xvnc:latest
        name: Xvnc-server
        ports:
        - containerPort: 7001

---
### service to expose the deployment
apiVersion: v1
kind: Service
metadata:
  name: Xvnc-service
spec:
  selector:
    app: Xvnc
  ports:
    - protocol: TCP
      port: 5800
      targetPort: 7001
  type: NodePort
